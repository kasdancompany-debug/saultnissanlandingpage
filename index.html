<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sault Nissan — Connect With Us</title>
  <meta name="description" content="Follow Sault Nissan on social media and visit our website. Your trusted Nissan dealer in Sault Ste. Marie, Ontario.">
  <meta name="theme-color" content="#0a0a0a">

  <meta property="og:title" content="Sault Nissan — Connect With Us">
  <meta property="og:description" content="Follow us on Facebook, Instagram & TikTok. Shop new & used Nissans in Sault Ste. Marie.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://ddztmb1ahc6o7.cloudfront.net/saultnissan/wp-content/uploads/2025/10/21115301/Sault-Nissan-Header.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --nissan-red: #c3002f;
      --nissan-red-hover: #a00027;
      --bg-dark: #0a0a0a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.65);
      --radius: 14px;
      --max-width: 420px;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.5;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(195, 0, 47, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(195, 0, 47, 0.08) 0%, transparent 50%);
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: var(--max-width);
      padding: 2.5rem 1.25rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .logo-wrap {
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.875rem;
      color: var(--text);
      text-decoration: none;
    }

    .logo-emblem {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }

    .logo-wordmark {
      font-family: "Arial Black", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(1.2rem, 5.2vw, 1.6rem);
      font-weight: 900;
      letter-spacing: 0.045em;
      line-height: 1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .tagline {
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      padding: 1rem 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      animation: fadeUp 0.6s ease both;
    }

    .link-btn:nth-child(1) { animation-delay: 0.15s; }
    .link-btn:nth-child(2) { animation-delay: 0.22s; }
    .link-btn:nth-child(3) { animation-delay: 0.29s; }
    .link-btn:nth-child(4) { animation-delay: 0.36s; }

    .link-btn:active {
      transform: scale(0.98);
    }

    @media (hover: hover) {
      .link-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .link-btn.primary:hover {
        background: var(--nissan-red-hover);
        border-color: var(--nissan-red-hover);
      }
    }

    .link-btn.primary {
      background: var(--nissan-red);
      border-color: var(--nissan-red);
    }

    .link-icon {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
    }

    .link-btn.primary .link-icon {
      background: rgba(0, 0, 0, 0.2);
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .link-text {
      flex: 1;
      text-align: left;
    }

    .link-label {
      display: block;
      font-size: 1rem;
      font-weight: 600;
    }

    .link-sub {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }

    .link-btn.primary .link-sub {
      color: rgba(255, 255, 255, 0.75);
    }

    .link-arrow {
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow {
      opacity: 0.8;
      transform: translateX(3px);
    }

    .contact {
      margin-top: 2rem;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.6s 0.45s ease both;
    }

    .contact-divider {
      width: 40px;
      height: 2px;
      background: var(--nissan-red);
      margin: 0 auto 1.25rem;
      border-radius: 1px;
    }

    .contact-item {
      display: block;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      transition: color 0.2s;
    }

    .contact-item:hover {
      color: var(--text);
    }

    .contact-item strong {
      color: var(--text);
      font-weight: 600;
    }

    footer {
      position: relative;
      z-index: 1;
      padding: 1.5rem 1.25rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
